name: Deploy Frontend (Pages)

on:
  push:
    branches: [main]
    paths:
      - chilemon-showdown/frontend/**

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: chilemon-showdown/frontend

      - name: Build frontend
        run: npm run build
        working-directory: chilemon-showdown/frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL != '' && secrets.VITE_API_URL || vars.VITE_API_URL }}

      - name: Deploy Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=chilemon-showdown
        working-directory: chilemon-showdown/frontend
